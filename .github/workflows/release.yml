name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_ext: ""

          - os: macos-13
            target: x86_64-apple-darwin
            binary_ext: ""

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_ext: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../glow-${{ matrix.target }}.tar.gz glow glw
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../glow-${{ matrix.target }}.zip glow.exe glw.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glow-${{ matrix.target }}
          path: glow-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate cli-spec.json
        run: |
          tar xzf artifacts/glow-x86_64-unknown-linux-gnu.tar.gz -C /tmp
          chmod +x /tmp/glow
          /tmp/glow --dump-cli-spec > artifacts/cli-spec.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: learnloopllc

      - name: Dispatch compat-update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          MIN_API=$(grep 'min_glow_api' compat.yml | cut -d'"' -f2)
          gh api repos/learnloopllc/api/dispatches \
            -f event_type=compat-update \
            -f 'client_payload[component]=glow-cli' \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[min_glow_api]=$MIN_API"

      - name: Dispatch to docs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/learnloopllc/docs/dispatches \
            -f event_type=glow-cli-release \
            -f "client_payload[version]=${GITHUB_REF#refs/tags/}"
