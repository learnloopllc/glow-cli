name: Sync API Types

on:
  repository_dispatch:
    types: [glow-api-release, learnloop-api-release]
  workflow_dispatch:
    inputs:
      source:
        description: "Source repo (glow-api or api)"
        required: true
        type: choice
        options: [glow-api, api]
      version:
        description: "Version (e.g. v0.5.0)"
        required: false

permissions:
  contents: write

concurrency:
  group: sync-api
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine source and version
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            if [ "${{ github.event.action }}" = "glow-api-release" ]; then
              SOURCE="glow-api"
            else
              SOURCE="api"
            fi
          else
            SOURCE="${{ inputs.source }}"
            VERSION="${{ inputs.version }}"
          fi

          # If no version, fetch latest release
          if [ -z "$VERSION" ]; then
            VERSION=$(gh release view --repo learnloopllc/$SOURCE --json tagName -q .tagName)
          fi

          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Determine target module
          if [ "$SOURCE" = "glow-api" ]; then
            echo "module=glow" >> "$GITHUB_OUTPUT"
          else
            echo "module=admin" >> "$GITHUB_OUTPUT"
          fi

          # Version without v prefix, dots→underscores for Rust module name
          CLEAN=$(echo "$VERSION" | sed 's/^v//')
          MOD_NAME=$(echo "$CLEAN" | tr '.' '_')
          echo "clean_version=$CLEAN" >> "$GITHUB_OUTPUT"
          echo "mod_name=v${MOD_NAME}" >> "$GITHUB_OUTPUT"

          echo "Source: $SOURCE, Version: $VERSION, Module: v${MOD_NAME}"

      - name: Download openapi.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.meta.outputs.version }}" \
            --repo learnloopllc/${{ steps.meta.outputs.source }} \
            --pattern openapi.json \
            --dir /tmp
          echo "Downloaded openapi.json from ${{ steps.meta.outputs.source }} ${{ steps.meta.outputs.version }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Rust types
        run: |
          MODULE="${{ steps.meta.outputs.module }}"
          MOD_NAME="${{ steps.meta.outputs.mod_name }}"
          SOURCE="${{ steps.meta.outputs.source }}"
          VERSION="${{ steps.meta.outputs.clean_version }}"

          # Generate versioned type file
          python3 scripts/generate-rust-types.py \
            /tmp/openapi.json "$SOURCE" "$VERSION" \
            > "src/${MODULE}/api/${MOD_NAME}.rs"

          echo "Generated src/${MODULE}/api/${MOD_NAME}.rs"

      - name: Update barrel file
        run: |
          MODULE="${{ steps.meta.outputs.module }}"
          MOD_NAME="${{ steps.meta.outputs.mod_name }}"
          API_DIR="src/${MODULE}/api"

          # Collect all version modules (v*.rs files)
          VERSIONS=""
          LATEST=""
          for f in "$API_DIR"/v*.rs; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .rs)
            VERSIONS="$VERSIONS $name"
            LATEST="$name"
          done

          # Write mod.rs
          cat > "$API_DIR/mod.rs" << MODEOF
          // ${MODULE}/api/ — Versioned types from OpenAPI specs
          //
          // Auto-generated by sync-api.yml. Each v*.rs file corresponds to
          // an API release. \`latest\` re-exports the newest version.

          MODEOF

          for v in $VERSIONS; do
            echo "#[allow(dead_code, non_camel_case_types, clippy::derive_partial_eq_without_eq)]" >> "$API_DIR/mod.rs"
            echo "pub mod ${v};" >> "$API_DIR/mod.rs"
            echo "" >> "$API_DIR/mod.rs"
          done

          echo "pub use ${LATEST} as latest;" >> "$API_DIR/mod.rs"

          echo "Updated $API_DIR/mod.rs — latest = $LATEST"
          cat "$API_DIR/mod.rs"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MODULE="${{ steps.meta.outputs.module }}"
          VERSION="${{ steps.meta.outputs.version }}"
          SOURCE="${{ steps.meta.outputs.source }}"

          git add "src/${MODULE}/api/"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync ${MODULE} types from ${SOURCE} ${VERSION}"
            git push
          fi
